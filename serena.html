<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Untuk Serena</title>
  <!-- Beautiful romantic fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=Great+Vibes&amp;family=Poppins:wght@300;400&amp;display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: linear-gradient(135deg, #fff0f8 0%, #f0f9ff 30%, #e0f7f5 55%, #f3e8ff 80%, #fff0f8 100%);
      --text: #3b0764;
      --text-sub: #5c3a6e;
      --glow-pink: #f472b6;
      --glow-purple: #c084fc;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      user-select: none;
    }

    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Cute floating background decorations - lucu lucu */
    .floating-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .floating-item {
      position: absolute;
      font-size: clamp(16px, 2.8vw, 32px);
      opacity: 0.7;
      animation: floatCute linear infinite;
      pointer-events: none;
      user-select: none;
      filter: drop-shadow(0 3px 6px rgba(0,0,0,0.1));
    }

    .floating-item.heart { color: #f9a8d4; }
    .floating-item.star { color: #c4b5fd; }
    .floating-item.butterfly { color: #a5b4fc; }
    .floating-item.sparkle { color: #fcd34d; font-size: clamp(12px, 2vw, 22px); }

    @keyframes floatCute {
      0% {
        transform: translateY(120vh) rotate(0deg) scale(0.6);
        opacity: 0;
      }
      15% {
        opacity: 0.75;
      }
      85% {
        opacity: 0.6;
      }
      100% {
        transform: translateY(-140px) rotate(520deg) scale(1.1);
        opacity: 0;
      }
    }

    /* Fullscreen Canvas for Flowers */
    #flowerCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    /* Compact card — pure vertical lift (NO scale, NO zoom feeling) */
    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      transition: transform 2.4s cubic-bezier(0.23, 1, 0.32, 1), 
                  opacity 2.4s ease;
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(16px);
      border-radius: 18px;
      padding: 14px 24px 16px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.9);
      max-width: 280px;
      margin: 0 auto;
      will-change: transform;
      backface-visibility: hidden;
    }

    .content.bloomed {
      transform: translateY(-132px);
      background: rgba(255, 255, 255, 0.85);
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
      opacity: 0.92;
    }

    /* ANIMATED TITLE CONTAINER */
    .name-container {
      display: inline-flex;
      gap: clamp(6px, 2vw, 14px);
      margin-bottom: 10px;
      cursor: pointer;
      position: relative;
    }

    /* Individual Letter Styling & Glow Animation */
    .letter {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2.4rem, 6.8vw, 4.8rem);
      font-weight: 700;
      color: #3b0764;
      position: relative;
      display: inline-block;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      letter-spacing: -0.5px;
      animation: sequentialGlow 4.5s infinite;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .letter:nth-child(1) { animation-delay: 0.0s; }
    .letter:nth-child(2) { animation-delay: 0.25s; }
    .letter:nth-child(3) { animation-delay: 0.5s; }
    .letter:nth-child(4) { animation-delay: 0.75s; }
    .letter:nth-child(5) { animation-delay: 1.0s; }
    .letter:nth-child(6) { animation-delay: 1.25s; }

    @keyframes sequentialGlow {
      0%, 40%, 100% {
        color: rgba(59, 7, 100, 0.45);
        text-shadow: 0 0 0 rgba(0,0,0,0);
        transform: translateY(0) scale(1);
      }
      10%, 25% {
        color: #3b0764;
        text-shadow: 
          0 2px 8px rgba(255, 255, 255, 0.7),
          0 0 15px rgba(244, 114, 182, 0.6),
          0 0 30px rgba(192, 132, 252, 0.5);
        transform: translateY(-6px) scale(1.05);
      }
    }

    .letter:hover, .letter.hovered {
      color: #1e0340 !important;
      transform: translateY(-12px) scale(1.12) !important;
      text-shadow: 
        0 3px 12px rgba(255,255,255,0.8),
        0 0 25px rgba(244, 114, 182, 0.7),
        0 0 45px rgba(192, 132, 252, 0.6) !important;
      animation-play-state: paused;
    }

    /* Diamond Shimmer Effect Overlay */
    .name-container::after {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.55),
        transparent
      );
      transform: skewX(-25deg);
      pointer-events: none;
      animation: shimmerSweep 6s infinite 2s;
    }

    @keyframes shimmerSweep {
      0% { left: -100%; }
      35%, 100% { left: 200%; }
    }

    p {
      font-family: 'Great Vibes', Georgia, cursive;
      font-size: clamp(1.15rem, 3vw, 1.55rem);
      color: #3b0764;
      font-weight: 400;
      letter-spacing: 0.5px;
      margin-bottom: 26px;
      opacity: 1;
      text-shadow: 0 1px 5px rgba(255,255,255,0.5);
    }

    /* Make button cuter */
    .btn-minimal {
      background: linear-gradient(135deg, #f9a8d4, #c4b5fd, #93c5fd);
      color: #3b0764;
      border: none;
      padding: 10px 32px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border-radius: 9999px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 6px 18px rgba(244, 114, 182, 0.3),
                  0 2px 8px rgba(192, 132, 252, 0.2);
      position: relative;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
    }

    .btn-minimal:hover {
      transform: scale(1.05) translateY(-2px);
      box-shadow: 0 10px 22px rgba(244, 114, 182, 0.4);
      background: linear-gradient(135deg, #f472b6, #a78bfa, #60a5fa);
    }

    .btn-minimal:active {
      transform: scale(0.96);
    }

    .btn-minimal.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(20px);
    }

    .btn-minimal.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(20px);
    }

    .bloom-message {
      position: fixed;
      bottom: 4%;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      z-index: 10;
      color: #3b0764;
      font-family: 'Great Vibes', Georgia, cursive;
      font-size: clamp(0.95rem, 2.4vw, 1.25rem);
      letter-spacing: 0.3px;
      font-weight: 400;
      opacity: 0;
      transition: opacity 1.3s ease 0.6s, transform 1.3s ease 0.6s;
      pointer-events: none;
      text-align: center;
      width: 84%;
      text-shadow: 0 1px 4px rgba(255,255,255,0.6);
    }

    .bloom-message.active {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .music-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 100;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(59, 7, 100, 0.2);
      color: #3b0764;
      padding: 9px 18px;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: none;
      align-items: center;
      gap: 6px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .music-btn.active {
      display: flex;
    }

    .music-btn:hover {
      background: rgba(255, 255, 255, 0.95);
      transform: translateY(-1px);
    }

    @media (max-width: 480px) {
      .name-container { gap: 6px; }
      p { letter-spacing: 1.5px; }
      .music-btn { bottom: 16px; right: 16px; padding: 6px 12px; font-size: 0.75rem; }
    }
  </style>
</head>

  <canvas id="flowerCanvas"></canvas>
  <!-- Cute floating background decorations - lucu lucu -->
  <div class="floating-bg" id="floatingBg"></div>

  <div class="content" id="mainContent">

      <span class="letter" onmouseover="playLetterSound(523.25)">S</span>
      <span class="letter" onmouseover="playLetterSound(587.33)">E</span>
      <span class="letter" onmouseover="playLetterSound(659.25)">R</span>
      <span class="letter" onmouseover="playLetterSound(698.46)">E</span>
      <span class="letter" onmouseover="playLetterSound(783.99)">N</span>
      <span class="letter" onmouseover="playLetterSound(880.00)">A</span>
    </div>
    <p>Nih buat lu, Serena.</p>

      Klik Di Sini
    </button>
  </div>

    <div class="bloom-message" id="bloomMessage">

    </div>

  <button class="music-btn" id="musicToggle" onclick="toggleMusic()">
    <span id="musicIcon">🔊</span> <span id="musicText">Musik: ON</span>
  </button>

  <script>
    const canvas = document.getElementById("flowerCanvas");
    const ctx = canvas.getContext("2d");
    
    let width, height;
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resize);
    resize();

    // === CUTE FLOATING DECORATIONS (lucu lucu) ===
    function spawnFloatingDecorations() {
      const container = document.getElementById("floatingBg");
      if (!container) return;

      const items = [
        { emoji: "💖", type: "heart" },
        { emoji: "⭐", type: "star" },
        { emoji: "🦋", type: "butterfly" },
        { emoji: "✨", type: "sparkle" },
        { emoji: "🌸", type: "heart" },
        { emoji: "🍓", type: "sparkle" },
        { emoji: "💕", type: "heart" },
        { emoji: "🌟", type: "star" }
      ];

      // Spawn several at once
      for (let i = 0; i < 28; i++) {
        const item = items[Math.floor(Math.random() * items.length)];
        const el = document.createElement("div");
        el.className = `floating-item ${item.type}`;
        el.textContent = item.emoji;

        const left = Math.random() * 100;
        el.style.left = left + "%";
        el.style.top = Math.random() * 100 + "%";

        // Different animation speeds & delays
        const duration = 9 + Math.random() * 19; // 9s - 28s
        const delay = -Math.random() * 24;
        el.style.animation = `floatCute ${duration}s linear ${delay}s infinite`;

        // Slight horizontal drift
        el.style.transform = `translateX(${Math.random() * 18 - 9}px)`;

        container.appendChild(el);
      }

      // Occasionally add more cute ones during runtime
      setInterval(() => {
        if (!container || container.children.length > 42) return;
        const item = items[Math.floor(Math.random() * items.length)];
        const el = document.createElement("div");
        el.className = `floating-item ${item.type}`;
        el.textContent = item.emoji;

        const left = Math.random() * 100;
        el.style.left = left + "%";
        el.style.top = "108%";

        const duration = 10 + Math.random() * 15;
        el.style.animation = `floatCute ${duration}s linear 0s forwards`;

        container.appendChild(el);

        // auto clean
        setTimeout(() => {
          if (el && el.parentNode) el.parentNode.removeChild(el);
        }, (duration + 2) * 1000);
      }, 2400);
    }

    // Auto spawn cute decorations
    setTimeout(spawnFloatingDecorations, 320);

    let audioCtx = null;
    let isMusicPlaying = false;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
    }

    function playLetterSound(freq) {
      try {
        initAudio();
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = "sine";
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
      } catch(e) {}
    }

    function playElegantChime() {
      try {
        initAudio();
        const notes = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99];
        notes.forEach((freq, index) => {
          setTimeout(() => {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = "sine";
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.0);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 2.0);
          }, index * 160);
        });
      } catch(e) {}
    }

    function playSingleNote(freq, type="sine", volume=0.03, duration=1.4) {
      try {
        initAudio();
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch(e) {}
    }

    function toggleMusic() {
      const bgMusic = document.getElementById("bgMusic");
      if (isMusicPlaying) {
        isMusicPlaying = false;
        if (bgMusic) bgMusic.pause();
        document.getElementById("musicIcon").innerText = "🔇";
        document.getElementById("musicText").innerText = "Musik: OFF";
      } else {
        isMusicPlaying = true;
        if (bgMusic) bgMusic.play().catch(() => {});
        document.getElementById("musicIcon").innerText = "🔊";
        document.getElementById("musicText").innerText = "Musik: ON";
      }
    }

    document.querySelectorAll(".letter").forEach(letter => {
      letter.addEventListener("touchstart", (e) => {
        e.preventDefault();
        letter.classList.add("hovered");
        playLetterSound(600 + Math.random() * 300);
        setTimeout(() => letter.classList.remove("hovered"), 600);
      });
    });

    const flowers = [];
    const particles = [];
    let isAnimating = false;

    const flowerPalettes = [
      { petal: "#f472b6", darkPetal: "#db2777", center: "#fef08a" }, // Pink Rose
      { petal: "#fb7185", darkPetal: "#e11d48", center: "#fef08a" }, // Deep Rose
      { petal: "#c084fc", darkPetal: "#9333ea", center: "#fde047" }, // Lavender Orchid
      { petal: "#38bdf8", darkPetal: "#0284c7", center: "#fef08a" }, // Sky Blue Blossom
      { petal: "#fca5a5", darkPetal: "#ef4444", center: "#fef08a" }, // Coral Blossom
      { petal: "#e879f9", darkPetal: "#c026d3", center: "#fef08a" }, // Magenta Lily
      // Tambahan warna baru lebih berwarna & lucu
      { petal: "#f9a8d4", darkPetal: "#e11d48", center: "#fef08a" }, // Cotton Candy Pink
      { petal: "#a5b4fc", darkPetal: "#6366f1", center: "#fef08a" }, // Pastel Blue
      { petal: "#67e8f9", darkPetal: "#06b6d4", center: "#fef08a" }, // Mint Teal
      { petal: "#fda4af", darkPetal: "#f43f5e", center: "#fef08a" }, // Peachy Rose
      { petal: "#c4b5fd", darkPetal: "#7c3aed", center: "#fde047" }, // Lilac Dream
      { petal: "#f0abfc", darkPetal: "#c026d3", center: "#fef08a" }, // Bubblegum
      { petal: "#bef575", darkPetal: "#65a30d", center: "#fef08a" }, // Fresh Lime
      { petal: "#fdba74", darkPetal: "#ea580c", center: "#fef08a" }  // Warm Peach
    ];

    class Flower {
      constructor(x, yTarget, palette, delay = 0) {
        this.x = x;
        this.yTarget = yTarget;
        this.yStart = height + 20;
        this.currentY = this.yStart;
        this.palette = palette;
        this.delay = delay;
        
        this.curveX = (Math.random() - 0.5) * 85;
        this.stemThickness = Math.random() * 2 + 3;
        
        this.growthProgress = 0;
        this.bloomProgress = 0;
        this.growthSpeed = Math.random() * 0.008 + 0.012;
        this.bloomSpeed = Math.random() * 0.012 + 0.018;
        
        this.petalCount = Math.floor(Math.random() * 4) + 6;
        this.petalSize = Math.random() * 16 + 28;
        this.rotationOffset = Math.random() * Math.PI;
        
        this.leaves = [
          { pos: 0.35, side: -1, size: Math.random() * 12 + 18, angle: -0.6, growth: 0 },
          { pos: 0.6, side: 1, size: Math.random() * 12 + 18, angle: 0.6, growth: 0 }
        ];

        this.finished = false;
      }

      update() {
        if (this.delay > 0) {
          this.delay--;
          return;
        }

        if (this.growthProgress < 1) {
          this.growthProgress += this.growthSpeed;
          if (this.growthProgress > 1) this.growthProgress = 1;

          const ease = 1 - Math.pow(1 - this.growthProgress, 3);
          this.currentY = this.yStart - (this.yStart - this.yTarget) * ease;

          this.leaves.forEach(leaf => {
            if (this.growthProgress >= leaf.pos) {
              leaf.growth = Math.min(1, (this.growthProgress - leaf.pos) / (1 - leaf.pos) * 1.5);
            }
          });

          if (Math.random() < 0.35) {
            const currentX = this.x + Math.sin(this.growthProgress * Math.PI) * this.curveX;
            particles.push(new Particle(currentX, this.currentY, this.palette.petal));
          }

        } else if (this.bloomProgress < 1) {
          this.bloomProgress += this.bloomSpeed;
          if (this.bloomProgress > 1) {
            this.bloomProgress = 1;
            this.finished = true;
          }
        }
      }

      draw() {
        if (this.delay > 0 || this.growthProgress <= 0) return;

        ctx.save();

        const endX = this.x + Math.sin(this.growthProgress * Math.PI) * this.curveX;
        const endY = this.currentY;
        const midX = this.x + (endX - this.x) * 0.5 + this.curveX * 0.5;
        const midY = (this.yStart + endY) * 0.5;

        ctx.beginPath();
        ctx.moveTo(this.x, this.yStart);
        ctx.quadraticCurveTo(midX, midY, endX, endY);
        ctx.strokeStyle = "#1b5e20";
        ctx.lineWidth = this.stemThickness;
        ctx.lineCap = "round";
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(this.x, this.yStart);
        ctx.quadraticCurveTo(midX, midY, endX, endY);
        ctx.strokeStyle = "#4caf50";
        ctx.lineWidth = Math.max(1, this.stemThickness - 2);
        ctx.stroke();

        this.leaves.forEach(leaf => {
          if (leaf.growth > 0) {
            const leafProgress = leaf.pos * this.growthProgress;
            const leafX = this.x + Math.sin(leafProgress * Math.PI) * this.curveX;
            const leafY = this.yStart - (this.yStart - this.yTarget) * leafProgress;

            ctx.save();
            ctx.translate(leafX, leafY);
            ctx.rotate(leaf.angle * leaf.growth + (leaf.side < 0 ? -0.2 : 0.2));
            ctx.scale(leaf.growth, leaf.growth);

            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.quadraticCurveTo(leaf.side * leaf.size, -leaf.size * 0.3, leaf.side * leaf.size * 1.2, -leaf.size);
            ctx.quadraticCurveTo(leaf.side * leaf.size * 0.2, -leaf.size * 0.8, 0, 0);
            
            const leafGrad = ctx.createLinearGradient(0, 0, leaf.side * leaf.size, -leaf.size);
            leafGrad.addColorStop(0, "#1b5e20");
            leafGrad.addColorStop(1, "#4caf50");
            ctx.fillStyle = leafGrad;
            ctx.fill();
            ctx.restore();

        if (this.bloomProgress > 0) {
          ctx.save();
          ctx.translate(endX, endY);
          ctx.rotate(this.rotationOffset);

          const bloomEase = 1 - Math.pow(1 - this.bloomProgress, 3);
          const currentSize = this.petalSize * bloomEase;

          const auraGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, currentSize * 1.6);
          auraGrad.addColorStop(0, this.palette.petal + "66");
          auraGrad.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = auraGrad;
          ctx.beginPath();
          ctx.arc(0, 0, currentSize * 1.6, 0, Math.PI * 2);
          ctx.fill();

          for (let i = 0; i < this.petalCount; i++) {
            const angle = (i / this.petalCount) * Math.PI * 2;
            ctx.save();
            ctx.rotate(angle);

            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(
              -currentSize * 0.45, -currentSize * 0.5,
              -currentSize * 0.45, -currentSize * 1.1,
              0, -currentSize * 1.25
            );
            ctx.bezierCurveTo(
              currentSize * 0.45, -currentSize * 1.1,
              currentSize * 0.45, -currentSize * 0.5,
              0, 0
            );

            const petalGrad = ctx.createLinearGradient(0, 0, 0, -currentSize * 1.25);
            petalGrad.addColorStop(0, this.palette.darkPetal);
            petalGrad.addColorStop(0.7, this.palette.petal);
            petalGrad.addColorStop(1, "#ffffff");

            ctx.fillStyle = petalGrad;
            ctx.fill();
            ctx.strokeStyle = "rgba(255,255,255,0.25)";
            ctx.lineWidth = 1;
            ctx.stroke();

            ctx.restore();
          }

          ctx.beginPath();
          ctx.arc(0, 0, currentSize * 0.22, 0, Math.PI * 2);
          const centerGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, currentSize * 0.22);
          centerGrad.addColorStop(0, "#ffffff");
          centerGrad.addColorStop(0.6, this.palette.center);
          centerGrad.addColorStop(1, "#ca8a04");
          ctx.fillStyle = centerGrad;
          ctx.fill();

          for (let j = 0; j < 6; j++) {
            const dotAngle = (j / 6) * Math.PI * 2;
            const dotDist = currentSize * 0.14;
            ctx.beginPath();
            ctx.arc(Math.cos(dotAngle) * dotDist, Math.sin(dotAngle) * dotDist, 1.5, 0, Math.PI * 2);
            ctx.fillStyle = "#713f12";
            ctx.fill();
          }

          ctx.restore();
        }

        ctx.restore();
      }
    }

    class Particle {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.size = Math.random() * 2.5 + 1;
        this.vx = (Math.random() - 0.5) * 1.2;
        this.vy = -Math.random() * 1.5 - 0.5;
        this.alpha = 1;
        this.decay = Math.random() * 0.015 + 0.01;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.alpha -= this.decay;
      }

      draw() {
        if (this.alpha <= 0) return;
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function animate() {
      if (!isAnimating && flowers.length === 0) return;

      // Cute pastel fade instead of dark black
      ctx.fillStyle = "rgba(255, 240, 248, 0.14)";
      ctx.fillRect(0, 0, width, height);

      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw();
        if (particles[i].alpha <= 0) particles.splice(i, 1);
      }

      flowers.forEach(flower => {
        flower.update();
        flower.draw();
      });

      requestAnimationFrame(animate);
    }

    function startFlowerAnimation() {
      document.getElementById("btnBloom").classList.add("hidden");
      document.getElementById("mainContent").classList.add("bloomed");
      document.getElementById("bloomMessage").classList.add("active");
      document.getElementById("musicToggle").classList.add("active");
      
      playElegantChime();
      
      // Putar lagu TikTok asli secara otomatis
      const bgMusic = document.getElementById("bgMusic");
      if (bgMusic) {
        bgMusic.volume = 0.85;
        bgMusic.play().then(() => {
          isMusicPlaying = true;
          document.getElementById("musicIcon").innerText = "🔊";
          document.getElementById("musicText").innerText = "Musik: ON";
        }).catch(e => console.log("Play error:", e));
      }
      
      isAnimating = true;
      animate();

      // Lebih banyak bunga + lebih rapat + random tambahan biar ga jarang
      const positions = [0.10, 0.20, 0.28, 0.38, 0.48, 0.58, 0.68, 0.78, 0.88];
      positions.forEach((posRatio, idx) => {
        const x = width * posRatio + (Math.random() - 0.5) * 55;
        const targetY = height * (0.55 + Math.random() * 0.18);
        const palette = flowerPalettes[idx % flowerPalettes.length];
        const delay = idx * 6 + Math.floor(Math.random() * 6);
        flowers.push(new Flower(x, targetY, palette, delay));
      });

      // Tambahan bunga random di awal supaya langsung berwarna banyak
      setTimeout(() => {
        for (let i = 0; i < 11; i++) {
          const x = width * (0.08 + Math.random() * 0.84);
          const y = height * (0.22 + Math.random() * 0.45);
          const palette = flowerPalettes[Math.floor(Math.random() * flowerPalettes.length)];
          const f = new Flower(x, y, palette, Math.floor(Math.random() * 4));
          flowers.push(f);
        }
      }, 280);

      window.addEventListener("click", (e) => {
        if (e.target.id === "btnBloom" || e.target.id === "musicToggle" || e.target.closest("#musicToggle") || e.target.classList.contains("letter")) return;
        playSingleNote(440 + Math.random() * 300, "triangle", 0.02, 1.2);
        
        const palette = flowerPalettes[Math.floor(Math.random() * flowerPalettes.length)];
        const newFlower = new Flower(e.clientX, Math.max(height * 0.2, e.clientY), palette, 0);
        flowers.push(newFlower);

        for (let i = 0; i < 12; i++) {
          particles.push(new Particle(e.clientX, e.clientY, palette.petal));
        }
      });
    }
